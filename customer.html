<!DOCTYPE html>
<html>
<head>
    <title>Customer Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>

<div class="container">

<h2>Customer Dashboard</h2>

<div class="search-box">
    <input type="text" placeholder="Search style...">
</div>

<div class="style-container">

    <div class="style-card">
        <h3>Hair Cut</h3>
        <p>₹200</p>
        <button onclick="bookStyle('Hair Cut')">Book Now</button>
    </div>

    <div class="style-card">
        <h3>Beard Styling</h3>
        <p>₹150</p>
        <button onclick="bookStyle('Beard Styling')">Book Now</button>
    </div>

    <div class="style-card">
        <h3>Facial</h3>
        <p>₹300</p>
        <button onclick="bookStyle('Facial')">Book Now</button>
    </div>

    <div class="style-card">
        <h3>Hair Coloring</h3>
        <p>₹500</p>
        <button onclick="bookStyle('Hair Coloring')">Book Now</button>
    </div>

</div>

</div>

</body>
</html>
