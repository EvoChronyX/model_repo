<!DOCTYPE html>
<html>
<head>
    <title>Manager Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h2>Manager Dashboard</h2>

<!-- FLEX CARDS -->
<div class="dashboard-container">

    <div class="dashboard-card">
        <h3>Total Staffs</h3>
        <p>5</p>
    </div>

    <div class="dashboard-card">
        <h3>Orders Completed</h3>
        <p>20</p>
    </div>

    <div class="dashboard-card">
        <h3>Pending Orders</h3>
        <p>3</p>
    </div>

    <div class="dashboard-card">
        <h3>Today Appointments</h3>
        <p>4</p>
    </div>

</div>

<!-- TABLE SECTION -->
<h3 style="margin-top:30px;">Today's Appointments</h3>

<table>
<tr>
    <th>Customer</th>
    <th>Style</th>
    <th>Status</th>
</tr>

<tr>
    <td>Ravi</td>
    <td>Hair Cut</td>
    <td>Pending</td>
</tr>

<tr>
    <td>Arun</td>
    <td>Facial</td>
    <td>Completed</td>
</tr>

</table>

</div>

</body>
</html>
